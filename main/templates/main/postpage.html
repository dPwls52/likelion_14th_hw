{% extends 'base.html' %}

{% block content %}
{% load static %}
<div>
{% if user.is_authenticated %}
    <a href="{% url 'main:new_post' %}">새 글 작성하기</a>
{% endif %}
</div>
<div class="card-grid">
    {% for post in posts %}
        <div class="card">
            <div class="card-content">
                <h2>{{ post.title }}</h2>
                <p style="color: red; font-weight: bold; ">{{ post.mood }}</p>
                <p>{{ blog.summary }}</p>
                <a href="{% url 'main:detail' post.id %}">자세히 보기</a>
            </div>
            <div class="card-footer">
                <div class="divider"></div>
                <span>{{ post.writer.profile.nickname }}</span>
            </div>
        </div>
    {% endfor %}
</div>
{% endblock %}
